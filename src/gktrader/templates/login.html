<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GKTrader — Login</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117; --surface: #161b22; --border: #21262d; --border-muted: #30363d;
  --text: #e6edf3; --text-muted: #8b949e;
  --tradeable: #3fb950; --tradeable-bg: #0d2d17;
  --bearish: #f85149; --watch: #388bfd;
  --font-mono: 'SFMono-Regular','Cascadia Code','Consolas',monospace;
}
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 36px 40px; width: 360px; }
.logo { font-family: var(--font-mono); font-weight: 700; font-size: 22px; margin-bottom: 6px; }
.logo span { color: var(--tradeable); }
.subtitle { font-size: 12px; color: var(--text-muted); margin-bottom: 28px; font-family: var(--font-mono); }
label { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); display: block; margin-bottom: 6px; }
input[type="password"] {
  width: 100%; background: #0d1117; border: 1px solid var(--border-muted); color: var(--text);
  padding: 9px 12px; border-radius: 6px; font-size: 14px; font-family: var(--font-mono); margin-bottom: 16px;
}
input[type="password"]:focus { outline: 2px solid rgba(56,139,253,.4); border-color: var(--watch); }
button { width: 100%; background: rgba(63,185,80,.15); color: var(--tradeable); border: 1px solid rgba(63,185,80,.4); padding: 10px; border-radius: 6px; font-size: 13px; font-weight: 700; font-family: var(--font-mono); cursor: pointer; }
button:hover { opacity: .85; }
.error { color: var(--bearish); font-size: 12px; font-family: var(--font-mono); margin-bottom: 12px; padding: 7px 10px; background: rgba(248,81,73,.1); border-radius: 5px; border: 1px solid rgba(248,81,73,.3); }
</style>
</head>
<body>
<div class="card">
  <div class="logo">GK<span>TRADER</span></div>
  <div class="subtitle">Political signal dashboard</div>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="post" action="/ui/login">
    <label for="secret">Access Secret</label>
    <input type="password" id="secret" name="secret" autocomplete="current-password" autofocus>
    <button type="submit">Enter →</button>
  </form>
</div>
</body>
</html>
