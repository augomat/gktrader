services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: gktrader
      POSTGRES_USER: gktrader
      POSTGRES_PASSWORD: gktrader
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gktrader -d gktrader"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot schema migration. Runs `alembic upgrade head` once and exits;
  # api/worker/scheduler wait for it to complete successfully before starting.
  migrate:
    build: .
    command: alembic upgrade head
    env_file:
      - .env
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    command: uvicorn gktrader.api.app:create_app --factory --host 0.0.0.0 --port 8000
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${API_HOST_PORT:-8788}:8000"

  worker:
    build: .
    command: celery -A gktrader.tasks.celery_app.celery_app worker --loglevel=INFO
    restart: unless-stopped
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  scheduler:
    build: .
    command: celery -A gktrader.tasks.celery_app.celery_app beat --loglevel=INFO
    restart: unless-stopped
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres-data:
  redis-data:
